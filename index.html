<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gesture Controlled Particles</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div id="ui">
        <h1>HoloParticles 3D</h1>
        <p>Status: <span id="status">Loading AI...</span></p>
        <p>🖐 <b>Open/Close Hand:</b> Expand/Collapse Particles</p>
        <p>👌 <b>Pinch (Thumb+Index):</b> Cycle Shape (Heart, Saturn, Flower)</p>
        <p>👋 <b>Move Hand:</b> Rotate & Move System</p>
    </div>

    <video id="video-feed" playsinline></video>
    
    <div id="canvas-container"></div>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/control_utils/control_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js" crossorigin="anonymous"></script>
    <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js" crossorigin="anonymous"></script>
    

    <script src="script.js"></script>

</body>
</html>
